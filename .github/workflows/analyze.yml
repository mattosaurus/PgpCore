name: Analyze
on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: true
jobs:
  analyze:
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: Download Test Coverage Artifact
        id: download-artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner
      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path .\.sonar\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner
      - name: List all downloaded artifacts
        run: |
          cd ${{ steps.download-artifact.outputs.download-path }}
          dir
      - name: Validate Sonar token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SONAR_TOKEN)) {
            throw "SONAR_TOKEN is missing."
          }

          $basicAuth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("$env:SONAR_TOKEN:"))
          $headers = @{ Authorization = "Basic $basicAuth" }
          $authResult = Invoke-RestMethod -Method Get -Uri "https://sonarcloud.io/api/authentication/validate" -Headers $headers
          if (-not $authResult.valid) {
            throw "SONAR_TOKEN failed authentication against SonarCloud."
          }

      - name: Sonar Begin
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          .\.sonar\scanner\dotnet-sonarscanner begin /k:"mattosaurus_PgpCore" /o:"mattosaurus" /d:sonar.token="$env:SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.cs.vscoveragexml.reportsPaths="${{ steps.download-artifact.outputs.download-path }}\coverage.xml"

      - name: Build
        shell: powershell
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Debug

      - name: Sonar End
        if: success()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"